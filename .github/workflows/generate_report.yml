name: Generate Research Report & Dashboard

on:
  schedule:
    - cron: '0 22 * * 1'   # 매주 화요일 07:00 KST (= UTC 22:00 월)
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_report.py

      - name: Generate dashboard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_dashboard.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add report.html dashboard.html scripts/.report_cache.json scripts/.research_questions.json || true
          git diff --cached --quiet || git commit -m "chore: 보고서·대시보드 자동 갱신 $(date +'%Y-%m-%d')"
          git push
