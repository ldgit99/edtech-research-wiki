name: Generate Research Report & Dashboard

on:
  schedule:
    - cron: '0 22 * * 1'   # 매주 화요일 07:00 KST (= UTC 22:00 월)
  workflow_dispatch:

concurrency:
  group: generate-report
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_report.py

      - name: Generate dashboard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_dashboard.py

      - name: Upload files via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="ldgit99/edtech-research-wiki"
          MSG="chore: 보고서·대시보드 자동 갱신 $(date +'%Y-%m-%d')"

          upload_file() {
            local path="$1"
            [ -f "$path" ] || return
            local content
            content=$(base64 -w0 "$path")
            local sha
            sha=$(gh api "repos/$REPO/contents/$path" --jq '.sha' 2>/dev/null || echo "")
            if [ -n "$sha" ]; then
              gh api "repos/$REPO/contents/$path" --method PUT \
                -f message="$MSG" -f content="$content" -f sha="$sha" --silent
            else
              gh api "repos/$REPO/contents/$path" --method PUT \
                -f message="$MSG" -f content="$content" --silent
            fi
            echo "  ✓ $path"
          }

          upload_file "report.html"
          upload_file "dashboard.html"
          upload_file "scripts/.report_cache.json"
          upload_file "scripts/.research_questions.json"
